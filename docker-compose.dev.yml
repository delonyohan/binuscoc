version: '3.8'

services:
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"

  backend:
    image: python:3.9-slim
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r backend/api/requirements.txt && uvicorn backend.api.main:app --host 0.0.0.0 --port 8501 --reload"
    volumes:
      - .:/app
    ports:
      - "8501:8501"
